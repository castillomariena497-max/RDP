name: RDP Publico con Ngrok

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600
    steps:
      - name: Configurar Escritorio Remoto
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP"
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Crear Usuario
        run: |
          $username = "YamzzOfficial"
          $password = "YamzzOffical@123"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username

      - name: Instalar Ngrok y Generar IP Publica
        run: |
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
          Expand-Archive ngrok.zip -DestinationPath .
          .\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          
          # Iniciar Ngrok en segundo plano
          Start-Process -FilePath ".\ngrok.exe" -ArgumentList "tcp 3389" -NoNewWindow
          
          Write-Host "Esperando a que Ngrok establezca el túnel..."
          $TunnelGenerado = $false
          $Intentos = 0
          
          # Bucle de reintentos para asegurar que Ngrok responda
          while (-not $TunnelGenerado -and $Intentos -lt 6) {
              Start-Sleep -Seconds 5
              try {
                  $response = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels" -ErrorAction Stop
                  if ($response.tunnels.Count -gt 0) {
                      $public_url = $response.tunnels[0].public_url
                      $clean_url = $public_url -replace "tcp://", ""
                      
                      Write-Host "*** === ACCESO RDP PUBLICO === ***"
                      Write-Host "Address: $clean_url"
                      Write-Host "Username: YamzzOfficial"
                      Write-Host "Password: YamzzOffical@123"
                      Write-Host "**********************************"
                      $TunnelGenerado = $true
                  }
              } catch {
                  $Intentos++
                  Write-Host "Intento $Intentos: Ngrok aún no responde, esperando..."
              }
          }
          
          if (-not $TunnelGenerado) {
              Write-Host "Error: Ngrok no pudo iniciar. Revisa tu NGROK_AUTH_TOKEN."
              exit 1
          }
          
          Write-Host "RDP Activo - Manteniendo la conexion abierta..."
          while ($true) { Start-Sleep -Seconds 300 }
